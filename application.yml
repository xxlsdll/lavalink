# Lavalink v4 config for Railway (alcapone music node).
# Secrets (password + Spotify keys) are set as Railway VARIABLES, not here,
# so they never live in your GitHub repo. See README.md.

server:
  port: 2333
  address: 0.0.0.0          # must be 0.0.0.0 inside a container

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.13.5"   # latest: github.com/lavalink-devs/youtube-source/releases
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.0"  # latest: github.com/topi314/LavaSrc/releases
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
  server:
    password: "youshallnotpass"   # OVERRIDDEN by the LAVALINK_SERVER_PASSWORD Railway variable
    sources:
      youtube: false               # handled by youtube-plugin above
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:                       # all on so the music presets work
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    youtubePlaylistLoadLimit: 6

plugins:
  lavasrc:
    sources:
      spotify: true
      applemusic: false
      deezer: false
    spotify:
      clientId: ""        # set via PLUGINS_LAVASRC_SPOTIFY_CLIENTID Railway variable
      clientSecret: ""    # set via PLUGINS_LAVASRC_SPOTIFY_CLIENTSECRET Railway variable
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"

logging:
  level:
    root: INFO
    lavalink: INFO
