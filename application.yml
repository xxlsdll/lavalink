# Lavalink v4 config for Railway (alcapone music node).
# Deezer-primary setup (same source bleed uses), SoundCloud fallback.
# No YouTube, no OAuth — nothing to expire or crash.
#
# Secrets are set as Railway VARIABLES, never in this file:
#   LAVALINK_SERVER_PASSWORD
#   PLUGINS_LAVASRC_SPOTIFY_CLIENTID
#   PLUGINS_LAVASRC_SPOTIFY_CLIENTSECRET
#   PLUGINS_LAVASRC_DEEZER_MASTERDECRYPTIONKEY   <-- you must obtain this
#   PLUGINS_LAVASRC_DEEZER_ARL                   <-- you must obtain this (free Deezer account)
server:
  port: 2333
  address: 0.0.0.0          # must be 0.0.0.0 inside a container
lavalink:
  plugins:
    # LavaSrc handles Spotify metadata + Deezer streaming. No YouTube plugin.
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"  # latest: github.com/topi314/LavaSrc/releases
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
  server:
    password: "youshallnotpass"   # OVERRIDDEN by the LAVALINK_SERVER_PASSWORD Railway variable
    sources:
      youtube: false               # YouTube disabled — it blocks bots
      bandcamp: true
      soundcloud: true             # fallback source — no auth required
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:                       # all on so the music presets work
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
plugins:
  lavasrc:
    sources:
      spotify: true       # resolves Spotify links/search -> played via providers below
      deezer: true        # PRIMARY source (full streaming)
      applemusic: false
    spotify:
      clientId: ""        # set via PLUGINS_LAVASRC_SPOTIFY_CLIENTID Railway variable
      clientSecret: ""    # set via PLUGINS_LAVASRC_SPOTIFY_CLIENTSECRET Railway variable
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
    deezer:
      masterDecryptionKey: ""   # set via PLUGINS_LAVASRC_DEEZER_MASTERDECRYPTIONKEY Railway variable
      arl: ""                   # set via PLUGINS_LAVASRC_DEEZER_ARL Railway variable
      formats: [ "MP3_128", "MP3_64" ]   # free ARL only. Premium ARL can add MP3_320/MP3_256/FLAC.
    # Track resolution order: Deezer by ISRC, then Deezer search, then SoundCloud as fallback.
    providers:
      - "dzisrc:%ISRC%"
      - "dzsearch:%QUERY%"
      - "scsearch:%QUERY%"
logging:
  level:
    root: INFO
    lavalink: INFO
