# Lavalink v4 config for Railway (alcapone music node).
# Secrets (password + Spotify keys) are set as Railway VARIABLES, not here,
# so they never live in your GitHub repo. See README.md.

server:
  port: 2333
  address: 0.0.0.0          # must be 0.0.0.0 inside a container

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"   # latest: github.com/lavalink-devs/youtube-source/releases
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.3"  # latest: github.com/topi314/LavaSrc/releases
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
  server:
    password: "youshallnotpass"   # OVERRIDDEN by the LAVALINK_SERVER_PASSWORD Railway variable
    sources:
      youtube: false               # handled by youtube-plugin above
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:                       # all on so the music presets work
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    youtubePlaylistLoadLimit: 6

plugins:
  youtube:
    enabled: true
    # OAuth makes YouTube treat the node like a signed-in user, which fixes the
    # "video requires login / all clients failed" playback errors.
    oauth:
      enabled: true
      # After the FIRST boot, copy the refreshToken from the Railway logs and paste
      # it here (uncommented), then redeploy — so it doesn't re-prompt every restart.
      # refreshToken: "PASTE_REFRESH_TOKEN_HERE"
    clients:
      - MUSIC        # search (ytmsearch)
      - WEB          # loading + playback
      - WEBEMBEDDED  # playback fallback
      - TV           # OAuth-backed playback — this is the one that uses your sign-in
      - ANDROID_VR   # fallback
  lavasrc:
    sources:
      spotify: true
      applemusic: false
      deezer: false
    spotify:
      clientId: ""        # set via PLUGINS_LAVASRC_SPOTIFY_CLIENTID Railway variable
      clientSecret: ""    # set via PLUGINS_LAVASRC_SPOTIFY_CLIENTSECRET Railway variable
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"

logging:
  level:
    root: INFO
    lavalink: INFO
